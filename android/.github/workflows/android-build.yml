# CI: assemble the debug APK and run JVM unit tests for the Flow Android module.
#
# The binary gradle/wrapper/gradle-wrapper.jar is intentionally NOT committed
# (see android/README.md). A clean checkout therefore cannot run ./gradlew until
# the wrapper jar is restored. This job bootstraps it with the runner's
# preinstalled Gradle, pinned to the same version as gradle-wrapper.properties
# (8.7), and then builds — keeping spec §0.1's "documented one-command build"
# reproducible in CI and spec §7.1's signed-APK pipeline buildable.
name: Android build

on:
  push:
    paths:
      - "android/**"
  pull_request:
    paths:
      - "android/**"
  workflow_dispatch: {}

defaults:
  run:
    working-directory: android

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Provides a system `gradle` on PATH so we can regenerate the wrapper jar.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      # Restore the wrapper jar that is not tracked in VCS. Matches the version in
      # gradle/wrapper/gradle-wrapper.properties so ./gradlew uses the intended Gradle.
      - name: Bootstrap Gradle wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: flow-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
